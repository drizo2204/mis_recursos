<script>
  let currentTab = 'dashboard';
  let searchTimeout;
  let autocompleteTimeout;

  function initializeApp() {
    setDefaultDates();
    loadListas();
    loadUbicaciones();
    loadDashboard();
    cargarFiltrosReporte();
    // Detectar dispositivo movil y forzar estilos
    checkMobileDevice();
    setVh();
  }

  function checkMobileDevice() {
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const isSmall = window.innerWidth <= 768;
    if (isMobile || isSmall) document.body.classList.add('mobile-device');

    window.addEventListener('resize', () => {
      if (window.innerWidth <= 768) document.body.classList.add('mobile-device');
      else { document.body.classList.remove('mobile-device'); closeSidebar?.(); }
      setVh();
    });
    window.addEventListener('orientationchange', setVh);
  }

  function setVh() {
    const vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
  }
  function setDefaultDates() {
    const today = new Date();
    const lastMonth = new Date();
    lastMonth.setMonth(today.getMonth() - 1);
    
    const fechaMovEl = document.getElementById("fechaMov");
    if (fechaMovEl) fechaMovEl.valueAsDate = today;
    
    const fechaDesdeEl = document.getElementById("fechaDesde");
    if (fechaDesdeEl) fechaDesdeEl.valueAsDate = lastMonth;
    
    const fechaHastaEl = document.getElementById("fechaHasta");
    if (fechaHastaEl) fechaHastaEl.valueAsDate = today;
  }

  function showTab(tab, event) {
    if (event) event.preventDefault();

    // Resetear scroll al inicio inmediatamente
    window.scrollTo(0, 0);

    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');

    if (event && event.target) {
      const link = event.target.classList.contains('nav-link') ? event.target : event.target.closest('.nav-link');
      if (link) link.classList.add('active');
    }

    currentTab = tab;

    // Cerrar sidebar en movil al cambiar de tab
    if (window.innerWidth <= 768) {
      closeSidebar();
    }

    // === FONDO OSCURO para analytics, claro para el resto ===
    if (tab === 'analytics') {
      document.documentElement.style.background = '#0d0d14';
      document.body.style.background = '#0d0d14';
      document.querySelector('.main-content').style.background = '#0d0d14';
    } else {
      document.documentElement.style.background = '';
      document.body.style.background = '';
      document.querySelector('.main-content').style.background = '';
    }

    if (tab === 'dashboard') loadDashboard();
    if (tab === 'inventario') mostrarStock();
    if (tab === 'analytics') loadAnalyticsDashboard();
    if (tab === 'movimientos') loadMovimientosRecientes();
    if (tab === 'finanzas') loadFinanzasResumen();

    // Forzar recalculo del layout y resetear scroll despues de un breve delay
    setTimeout(() => {
      // Forzar reflow del DOM
      const mainContent = document.querySelector('.main-content');
      if (mainContent) {
        mainContent.style.minHeight = 'auto';
        void mainContent.offsetHeight; // Forzar reflow
      }

      // Resetear scroll nuevamente por si acaso
      window.scrollTo(0, 0);
      document.body.scrollTop = 0;
      document.documentElement.scrollTop = 0;
    }, 50);
  }

  // ========== FUNCIONES DEL MEN RESPONSIVE ==========
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('open');
  }

  function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.remove('open');
  }

  // Cerrar sidebar al hacer click fuera en movil
  document.addEventListener('click', function (e) {
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.querySelector('.menu-toggle');

    if (window.innerWidth <= 768) {
      if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
        closeSidebar();
      }
    }
  });

  function loadDashboard() {
    // Skeleton mientras carga
    document.getElementById('statsGrid').innerHTML = [
      'Productos','Movimientos','Sin Stock','Stock Bajo','Valor Total'
    ].map(l => `<div class="stat-card"><div class="skeleton skeleton-text" style="height:38px;width:60%;margin:0 auto 8px"></div><div class="stat-label">${l}</div></div>`).join('');

    google.script.run
      .withSuccessHandler(function(resumen) {
        const fmt = function(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n); };
        document.getElementById('statsGrid').innerHTML =
          `<div class="stat-card clickable" onclick="showStockAlerts('ALL')">
             <div class="stat-value">${fmt(resumen.totalProductos)}</div>
             <div class="stat-label">Productos</div>
           </div>
           <div class="stat-card">
             <div class="stat-value">${fmt(resumen.totalMovimientos)}</div>
             <div class="stat-label">Movimientos</div>
           </div>
           <div class="stat-card clickable" onclick="showStockAlerts('OUT_OF_STOCK')" style="border-color:var(--danger);">
             <div class="stat-value" style="color:var(--danger)">${fmt(resumen.sinStock)}</div>
             <div class="stat-label">Sin Stock</div>
           </div>
           <div class="stat-card clickable" onclick="showStockAlerts('LOW_STOCK')" style="border-color:var(--warning);">
             <div class="stat-value" style="color:var(--warning)">${fmt(resumen.stockBajo)}</div>
             <div class="stat-label">Stock Bajo</div>
           </div>
           <div class="stat-card">
             <div class="stat-value" style="font-size:1.4rem">C$${Number(resumen.valorTotalInventario||0).toLocaleString('es-NI',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
             <div class="stat-label">Valor en Inventario</div>
           </div>`;
      })
      .withFailureHandler(function(error) {
        document.getElementById('statsGrid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Error al cargar</div></div>';
      })
      .obtenerResumen();
  }

  function showStockAlerts(filterType) {
    const container = document.getElementById('alertsContainer');
    container.innerHTML = '<div class="loading">Buscando...</div>';
    google.script.run
      .withSuccessHandler(function(stock) {
        let alertas;
        let titleText = "";
        if (filterType === 'OUT_OF_STOCK') {
           alertas = stock.filter(function(p) { return p.cantidad <= 0; });
           titleText = alertas.length + ' producto(s) sin stock';
        } else if (filterType === 'LOW_STOCK') {
           alertas = stock.filter(function(p) { return p.cantidad > 0 && p.cantidad <= p.stockMin && p.stockMin > 0; });
           titleText = alertas.length + ' producto(s) con stock bajo';
        } else if (filterType === 'ALL') {
           alertas = stock;
           titleText = alertas.length + ' producto(s) en total';
        } else {
           alertas = stock.filter(function(p) { return p.cantidad <= 0 || (p.cantidad <= p.stockMin && p.stockMin > 0); });
           titleText = alertas.length + ' producto(s) requieren atención';
        }

        if (alertas.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-title">No hay productos</div><div class="empty-state-sub">Filtro vacío o todo correcto.</div></div>';
          return;
        }

        window._alertasTitleText = titleText;
        // Renderizar con paginación
        renderAlertasConPaginacion(alertas, container, 1);
      })
      .withFailureHandler(function(err) {
        container.innerHTML = '<div class="message error">Error: ' + err + '</div>';
      })
      .obtenerStock();
  }

  function renderAlertasConPaginacion(alertas, container, paginaActual) {
    var POR_PAGINA = 10;
    var totalPags = Math.ceil(alertas.length / POR_PAGINA);
    var inicio = (paginaActual - 1) * POR_PAGINA;
    var fin = Math.min(inicio + POR_PAGINA, alertas.length);
    var pagina = alertas.slice(inicio, fin);

    var titleText = window._alertasTitleText || (alertas.length + ' producto(s) en la lista');
    var html = '<div class="message warning"><strong>⚠️ ' + titleText + '</strong></div>';
    html += '<div class="table-container"><table><thead><tr><th>Código</th><th>Nombre</th><th>Stock</th><th>Mín.</th><th>Estado</th></tr></thead><tbody>';

    pagina.forEach(function(p) {
      var sinStock = p.cantidad <= 0;
      html += '<tr class="' + (sinStock ? 'status-zero' : 'status-low') + '">' +
        '<td><code>' + p.codigo + '</code></td>' +
        '<td>' + p.nombre + '</td>' +
        '<td><strong>' + (p.cantidad||0) + '</strong></td>' +
        '<td>' + (p.stockMin||0) + '</td>' +
        '<td><span class="badge ' + (sinStock ? 'badge-red' : 'badge-orange') + '">' + (sinStock ? 'Sin Stock' : 'Stock Bajo') + '</span></td>' +
        '</tr>';
    });

    html += '</tbody></table></div>';
    html += buildPaginacion(paginaActual, totalPags, 'renderAlertasConPaginacion', alertas, container);

    container.innerHTML = html;
  }

  function loadListas() {
    google.script.run
      .withSuccessHandler(listas => {
        const unidadSelect = document.getElementById("unidadEntrada");
        const grupoSelect = document.getElementById("grupoEntrada");
        unidadSelect.innerHTML = "";
        grupoSelect.innerHTML = "";
        listas.unidades.forEach(u => unidadSelect.innerHTML += `<option value="${u}">${u}</option>`);
        listas.grupos.forEach(g => grupoSelect.innerHTML += `<option value="${g}">${g}</option>`);
      })
      .obtenerListas();
  }

  function loadUbicaciones() {
    google.script.run
      .withSuccessHandler(ubicaciones => {
        const select = document.getElementById("almacenEntrada");
        select.innerHTML = "";
        if (!ubicaciones || ubicaciones.length === 0) {
          select.innerHTML = '<option value="Casa Luden">Casa Luden</option><option value="Casa Jean">Casa Jean</option><option value="Casa Dylan">Casa Dylan</option>';
          return;
        }
        ubicaciones.forEach(ub => select.innerHTML += `<option value="${ub}">${ub}</option>`);
      })
      .withFailureHandler(error => {
        const select = document.getElementById("almacenEntrada");
        select.innerHTML = '<option value="Casa Luden">Casa Luden</option><option value="Casa Jean">Casa Jean</option><option value="Casa Dylan">Casa Dylan</option>';
      })
      .obtenerUbicaciones();
  }

  function buscarProductoAutocompletado() {
    clearTimeout(autocompleteTimeout);
    const codigo = document.getElementById("codigoMov").value.trim().toUpperCase();
    if (codigo.length === 0) {
      document.getElementById("autocompleteDropdown").style.display = "none";
      return;
    }
    autocompleteTimeout = setTimeout(() => {
      google.script.run.withSuccessHandler(mostrarAutocompletado).buscarProductoPorCodigo(codigo);
    }, 200);
  }

  function mostrarAutocompletado(productos = []) {
    const dropdown = document.getElementById("autocompleteDropdown");
    if (productos.length === 0) {
      dropdown.style.display = "none";
      return;
    }
    let html = "";
    productos.forEach(p => {
      html += `<div class="autocomplete-item" onmousedown="seleccionarProducto('${p.codigo}','${p.nombre}')">
          <div class="autocomplete-code">${p.codigo}</div>
          <div class="autocomplete-name">${p.nombre}</div>
        </div>`;
    });
    dropdown.innerHTML = html;
    dropdown.style.display = "block";
  }

  function seleccionarProducto(codigo, nombre) {
    document.getElementById("codigoMov").value = codigo;
    document.getElementById("autocompleteDropdown").style.display = "none";
  }

  function ocultarAutocompletado() {
    setTimeout(() => document.getElementById("autocompleteDropdown").style.display = "none", 150);
  }

  function buscarProductoEntrada() {
    clearTimeout(autocompleteTimeout);
    const codigo = document.getElementById("codigoEntrada").value.trim().toUpperCase();
    if (codigo.length === 0) {
      document.getElementById("autocompleteEntrada").style.display = "none";
      return;
    }
    autocompleteTimeout = setTimeout(() => {
      google.script.run.withSuccessHandler(mostrarAutocompletadoEntrada).buscarProductoPorCodigo(codigo);
    }, 200);
  }

  function mostrarAutocompletadoEntrada(productos = []) {
    const dropdown = document.getElementById("autocompleteEntrada");
    if (productos.length === 0) {
      dropdown.style.display = "none";
      return;
    }
    let html = "";
    productos.forEach(p => {
      html += `<div class="autocomplete-item" onmousedown="seleccionarProductoEntrada('${p.codigo}','${p.nombre}',${p.precio})">
          <div class="autocomplete-code">${p.codigo}</div>
          <div class="autocomplete-name">${p.nombre} - $${p.precio}</div>
        </div>`;
    });
    dropdown.innerHTML = html;
    dropdown.style.display = "block";
  }

  function seleccionarProductoEntrada(codigo, nombre, precio) {
    document.getElementById("codigoEntrada").value = codigo;
    document.getElementById("nombreEntrada").value = nombre;
    document.getElementById("precioEntrada").value = precio;
    document.getElementById("autocompleteEntrada").style.display = "none";
  }

  function ocultarAutocompletadoEntrada() {
    setTimeout(() => document.getElementById("autocompleteEntrada").style.display = "none", 150);
  }

  function registrarEntrada(event) {
    event.preventDefault();

    const form = event.target;
    const submitButton = form.querySelector('button[type="submit"]');

    if (!submitButton) {
      console.error('No se encontro el boton de submit');
      return;
    }

    const originalButtonText = submitButton.innerHTML;

    submitButton.disabled = true;
    submitButton.innerHTML = ' Procesando...';
    submitButton.style.opacity = '0.6';
    submitButton.style.cursor = 'not-allowed';

    const timeoutId = setTimeout(function () {
      restaurarBoton();
      mostrarMensajeSafe('msgEntrada', ' La operacion esta tardando mucho. Verifica si se registro.', 'warning');
    }, 10000);

    function restaurarBoton() {
      clearTimeout(timeoutId);
      submitButton.disabled = false;
      submitButton.innerHTML = originalButtonText;
      submitButton.style.opacity = '1';
      submitButton.style.cursor = 'pointer';
      console.log(' Boton restaurado');
    }

    // " FUNCI"N AUXILIAR SEGURA para mostrar mensajes
    function mostrarMensajeSafe(containerId, message, type) {
      const container = document.getElementById(containerId);
      if (container) {
        const cssClass = 'message ' + type;
        container.innerHTML = '<div class="' + cssClass + '">' + message + '</div>';
        if (type === 'success') {
          setTimeout(function () { container.innerHTML = ''; }, 5000);
        }
      } else {
        console.warn(' Contenedor ' + containerId + ' no encontrado');
        console.log(message);
      }
    }

    // Obtener valores
    const codigo = document.getElementById('codigoEntrada').value.trim().toUpperCase();
    const nombre = document.getElementById('nombreEntrada').value.trim();
    const cantidad = parseInt(document.getElementById('cantidadEntrada').value);
    const costo = parseFloat(document.getElementById('costoEntrada').value) || 0;
    const precio = parseFloat(document.getElementById('precioEntrada').value) || 0;
    const almacen = document.getElementById('almacenEntrada').value.trim();
    const unidad = document.getElementById('unidadEntrada')?.value || "Unidades";
    const grupo = document.getElementById('grupoEntrada')?.value || "General";
    const stockMin = parseInt(document.getElementById('stockMinEntrada')?.value) || 0;
    const descripcion = document.getElementById('descripcionEntrada')?.value.trim() || "";

    // Validaciones
    if (!codigo) {
      mostrarMensajeSafe('msgEntrada', ' El codigo del producto es obligatorio', 'error');
      restaurarBoton();
      return;
    }

    if (!nombre) {
      mostrarMensajeSafe('msgEntrada', ' El nombre del producto es obligatorio', 'error');
      restaurarBoton();
      return;
    }

    if (!cantidad || cantidad <= 0) {
      mostrarMensajeSafe('msgEntrada', ' La cantidad debe ser mayor a 0', 'error');
      restaurarBoton();
      return;
    }

    if (precio <= 0) {
      mostrarMensajeSafe('msgEntrada', ' El precio debe ser mayor a 0', 'error');
      restaurarBoton();
      return;
    }

    if (!almacen) {
      mostrarMensajeSafe('msgEntrada', ' La ubicacion/almacen es obligatoria', 'error');
      restaurarBoton();
      return;
    }

    // Crear objeto de datos
    const datos = {
      codigo: codigo,
      nombre: nombre,
      cantidad: cantidad,
      costo: costo,
      precio: precio,
      almacen: almacen,
      unidad: unidad,
      grupo: grupo,
      stockMin: stockMin,
      descripcion: descripcion
    };

    console.log('" Enviando datos:', datos);
    mostrarMensajeSafe('msgEntrada', ' Registrando entrada...', 'info');

    // Enviar al servidor
    google.script.run
      .withSuccessHandler(function (resultado) {
        console.log('" Respuesta del servidor:', resultado);
        restaurarBoton();

        // El backend retorna un STRING
        if (resultado && (resultado.includes('') || resultado.includes('correctamente'))) {
          mostrarMensajeSafe('msgEntrada', resultado, 'success');

          // Limpiar formulario
          form.reset();

          // Recargar vistas
          if (typeof mostrarStock === 'function') {
            setTimeout(mostrarStock, 500);
          }
          if (typeof loadDashboard === 'function') {
            setTimeout(loadDashboard, 500);
          }
        } else {
          mostrarMensajeSafe('msgEntrada', resultado || ' Error desconocido', 'error');
        }
      })
      .withFailureHandler(function (error) {
        console.error(' Error del servidor:', error);
        restaurarBoton();
        mostrarMensajeSafe('msgEntrada', ' Error al registrar: ' + error.message, 'error');
      })
      .insertarProductoConUbicacion(datos);
  }
  // registrarMovimiento fue eliminado (el form ya no existe en la UI).
  // Los movimientos se hacen via modalVenta y modalTransferencia.

  function handleTipoChange() {
    // Reservado para compatibilidad futura
  }

  // Cache para búsqueda instantánea sin hits al servidor
  var _stockCache = null;
  var _stockCacheTs = 0;
  var CACHE_TTL = 5 * 60 * 1000; // 5 minutos

  function buscarProducto() {
    var texto = document.getElementById('buscarTexto').value.trim();
    if (!texto) {
      document.getElementById('resultadosBusqueda').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">Ingresa un texto</div></div>';
      return;
    }
    // Si el cache es reciente, filtrar localmente sin llamar al server
    if (_stockCache && (Date.now() - _stockCacheTs) < CACHE_TTL) {
      _filtrarYMostrarResultados(texto, _stockCache);
    } else {
      document.getElementById('resultadosBusqueda').innerHTML = '<div class="loading">Buscando...</div>';
      google.script.run
        .withSuccessHandler(function(resultado) {
          _stockCache = resultado;
          _stockCacheTs = Date.now();
          _filtrarYMostrarResultados(texto, resultado);
        })
        .withFailureHandler(function(err) {
          showMessage('resultadosBusqueda', 'Error: ' + err, 'error');
        })
        .obtenerStockPorUbicacion();
    }
  }

  function _filtrarYMostrarResultados(texto, resultado) {
    var q = texto.toLowerCase().trim();
    var productos = resultado && resultado.productos ? resultado.productos : (Array.isArray(resultado) ? resultado : []);
    var ubicaciones = resultado && resultado.ubicaciones ? resultado.ubicaciones : [];

    var filtrados = productos.filter(function(p) {
      return (p.codigo||'').toLowerCase().includes(q) || (p.nombre||'').toLowerCase().includes(q) || (p.grupo||'').toLowerCase().includes(q);
    });

    displaySearchResults_v2(filtrados, ubicaciones, texto);
  }

  function buscarEnTiempoReal() {
    clearTimeout(searchTimeout);
    var texto = document.getElementById('buscarTexto').value.trim();
    if (texto.length === 0) {
      document.getElementById('resultadosBusqueda').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">Busca un producto</div><div class="empty-state-sub">Escribe el código o nombre para encontrarlo</div></div>';
      return;
    }
    // Con cache: 0ms de delay; sin cache: 250ms para no spamear
    var delay = (_stockCache && (Date.now() - _stockCacheTs) < CACHE_TTL) ? 0 : 250;
    searchTimeout = setTimeout(function() {
      if (texto.length >= 1) buscarProducto();
    }, delay);
  }

  // Mantener compatibilidad con llamadas antiguas
  function displaySearchResults(results) {
    if (!results || results.length === 0) {
      document.getElementById('resultadosBusqueda').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">Sin resultados</div></div>';
      return;
    }
    // Convertir formato antiguo (array) a formato nuevo
    var productos = results.map(function(r) {
      return { codigo: r[0], nombre: r[1], unidad: r[2], grupo: r[3], stockMin: r[4], cantidad: r[5], precio: r[6] };
    });
    displaySearchResults_v2(productos, [], '');
  }

  // Nueva función principal de resultados — tarjetas por almacén
  function displaySearchResults_v2(productos, ubicaciones, query) {
    var container = document.getElementById('resultadosBusqueda');
    if (!productos || productos.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">Sin resultados para "' + query + '"</div><div class="empty-state-sub">Intenta con otro código o nombre</div></div>';
      return;
    }

    var html = '<div class="search-result-header"><span class="badge badge-blue">' + productos.length + ' producto(s) encontrado(s)</span></div>';
    html += '<div class="search-results-grid">';

    productos.forEach(function(p) {
      var total = 0;
      var ubsHtml = '';

      if (p.ubicaciones && Object.keys(p.ubicaciones).length > 0) {
        // Formato nuevo con desglose por ubicación
        var ubicsList = Object.entries(p.ubicaciones);
        ubicsList.forEach(function(entry) {
          var ub = entry[0], cant = Number(entry[1]) || 0;
          total += cant;
          var pct = 0; // se calcula después
          ubsHtml += '<div class="ub-row" data-cant="' + cant + '" data-ub="' + ub + '">' +
            '<span class="ub-name">' + ub + '</span>' +
            '<span class="ub-badge ' + (cant <= 0 ? 'empty' : cant <= (p.stockMin||0) ? 'low' : 'ok') + '">' + cant + '</span>' +
            '</div>';
        });
      } else {
        total = Number(p.cantidad) || Number(p.total) || 0;
      }

      var estado = total <= 0 ? 'sin-stock' : (total <= (p.stockMin||0) && (p.stockMin||0) > 0 ? 'stock-bajo' : 'ok');
      var estadoLabel = total <= 0 ? 'Sin Stock' : (estado === 'stock-bajo' ? 'Stock Bajo' : 'Normal');
      var badgeCls = total <= 0 ? 'badge-red' : (estado === 'stock-bajo' ? 'badge-orange' : 'badge-green');

      // Barra de progreso relativa al stock mínimo
      var pctBar = p.stockMin > 0 ? Math.min(100, Math.round((total / p.stockMin) * 100)) : 100;

      html += '<div class="search-result-card ' + estado + '">' +
        '<div class="src-header">' +
          '<div>' +
            '<div class="src-code">' + (p.codigo||'') + '</div>' +
            '<div class="src-name">' + (p.nombre||'') + '</div>' +
          '</div>' +
          '<span class="badge ' + badgeCls + '">' + estadoLabel + '</span>' +
        '</div>' +
        '<div class="src-meta">' +
          '<span>📊 <strong>' + total + '</strong> uds. totales</span>' +
          (p.precio ? '<span>💰 C$' + Number(p.precio).toFixed(2) + '</span>' : '') +
          (p.grupo ? '<span>🏷️ ' + p.grupo + '</span>' : '') +
        '</div>';

      if (ubsHtml) {
        html += '<div class="src-ubicaciones">' + ubsHtml + '</div>';
      } else {

  function verDetalleUbicaciones(codigo) {

          return;

        if (resultado.mensaje) {
          showMessage('resultadosBusqueda', resultado.mensaje, 'warning');
          return;
        }
        if (!resultado.coincidencias || resultado.coincidencias.length === 0) {
          showMessage('resultadosBusqueda', 'No se encontraron ubicaciones para: ' + codigo, 'warning');
          return;

        html += '<div class="detalle-total">' + total + ' uds. en total</div>';

              '<span>💳 Costo: C$' + (ub.costo ? Number(ub.costo).toFixed(2) : '0.00') + '</span>' +

  function _actualizarKPIs(resultado) {
    var ubicaciones = [];
    var productos = [];
    if (Array.isArray(resultado)) {
      productos = resultado;
    } else if (resultado && resultado.productos) {
      ubicaciones = resultado.ubicaciones || [];
      productos = resultado.productos || [];
    }

    var total = productos.length;
    var sinStock = 0, stockBajo = 0, valor = 0;

    productos.forEach(function(p) {
      var cant = 0;
      if (p.ubicaciones) {
        Object.values(p.ubicaciones).forEach(function(c) { cant += Number(c) || 0; });
      } else {
        cant = Number(p.cantidad) || Number(p.total) || 0;
      }
      if (cant <= 0) sinStock++;
      else if (p.stockMin > 0 && cant <= p.stockMin) stockBajo++;
      valor += cant * (Number(p.precio) || 0);
    });

    var fmtNum = function(n) { return n.toLocaleString('es-NI'); };
    var fmtMoney = function(n) { return 'C$ ' + n.toLocaleString('es-NI', {minimumFractionDigits:0, maximumFractionDigits:0}); };

    var el; 
    el = document.getElementById('kpiTotalProductos'); if (el) el.textContent = fmtNum(total);
    el = document.getElementById('kpiSinStock');       if (el) el.textContent = fmtNum(sinStock);
    el = document.getElementById('kpiStockBajo');      if (el) el.textContent = fmtNum(stockBajo);
    el = document.getElementById('kpiValorTotal');     if (el) el.textContent = fmtMoney(valor);
  }

  function filtrarTablaInventario(texto) {

    _invPagActual = 1;

  }

  function _renderInventario(resultado, pagina, filtro) {
    var ubicaciones = [];
    var productos = [];
    if (Array.isArray(resultado)) {
      productos = resultado;
    } else if (resultado && resultado.productos) {
      ubicaciones = resultado.ubicaciones || [];
      productos = resultado.productos || [];
    }

    // Filtrar
    var filtrados = filtro ? productos.filter(function(p) {
      var q = filtro.toLowerCase();
      return (p.codigo||'').toLowerCase().includes(q) || (p.nombre||'').toLowerCase().includes(q) || (p.grupo||'').toLowerCase().includes(q);
    }) : productos;

    if (filtrados.length === 0) {
      document.getElementById('stockTable').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-title">' +
        (filtro ? 'Sin resultados para "' + filtro + '"' : 'No hay productos en inventario') +
        '</div></div>';
      return;
    }

    var totalPags = Math.ceil(filtrados.length / INV_POR_PAGINA);
    pagina = Math.max(1, Math.min(pagina, totalPags));
    _invPagActual = pagina;
    var inicio = (pagina - 1) * INV_POR_PAGINA;
    var paginaData = filtrados.slice(inicio, inicio + INV_POR_PAGINA);

    var html = '';

    if (ubicaciones.length > 0) {
      // Tabla con columnas por ubicación
      html += '<div class="table-container"><table><thead><tr>' +
        '<th>🏷️ Código</th><th>Nombre</th><th>Grupo</th>';
      ubicaciones.forEach(function(u) { html += '<th>🏠 ' + u + '</th>'; });
      html += '<th>Total</th><th>C$ Precio</th><th>Estado</th></tr></thead><tbody>';

      paginaData.forEach(function(p) {
        var totalCalc = 0;
        ubicaciones.forEach(function(u) { totalCalc += Number((p.ubicaciones||{})[u]) || 0; });
        var sinStock = totalCalc <= 0;
        var bajStock = !sinStock && p.stockMin > 0 && totalCalc <= p.stockMin;
        var rowCls = sinStock ? 'status-zero' : bajStock ? 'status-low' : 'status-normal';
        var badgeCls = sinStock ? 'badge-red' : bajStock ? 'badge-orange' : 'badge-green';
        var estadoLabel = sinStock ? 'Sin Stock' : bajStock ? 'Stock Bajo' : 'Normal';
        var valor = totalCalc * (Number(p.precio) || 0);

        html += '<tr class="' + rowCls + '">' +
          '<td><code>' + p.codigo + '</code></td>' +
          '<td>' + p.nombre + '</td>' +
          '<td><span style="font-size:0.78rem;color:var(--text-muted)">' + (p.grupo||'General') + '</span></td>';

        ubicaciones.forEach(function(u) {
          var c = Number((p.ubicaciones||{})[u]) || 0;
          html += '<td>' + (c > 0 ? '<strong>' + c + '</strong>' : '<span style="color:var(--text-muted)">0</span>') + '</td>';
        });

        html += '<td><strong>' + totalCalc + '</strong></td>' +
          '<td>C$' + Number(p.precio||0).toFixed(2) + '</td>' +
          '<td><span class="badge ' + badgeCls + '">' + estadoLabel + '</span></td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
    } else {
      html += '<div class="table-container"><table><thead><tr><th>Código</th><th>Nombre</th><th>Grupo</th><th>Mín.</th><th>Stock</th><th>C$ Precio</th><th>Estado</th></tr></thead><tbody>';
      paginaData.forEach(function(p) {
        var cant = Number(p.cantidad) || Number(p.total) || 0;
        var sinStock = cant <= 0;
        var bajStock = !sinStock && p.stockMin > 0 && cant <= p.stockMin;
        var rowCls = sinStock ? 'status-zero' : bajStock ? 'status-low' : 'status-normal';
        var badgeCls = sinStock ? 'badge-red' : bajStock ? 'badge-orange' : 'badge-green';
        var estadoLabel = sinStock ? 'Sin Stock' : bajStock ? 'Stock Bajo' : 'Normal';
        html += '<tr class="' + rowCls + '">' +
          '<td><code>' + p.codigo + '</code></td>' +
          '<td>' + p.nombre + '</td>' +
          '<td>' + (p.grupo||'General') + '</td>' +
          '<td>' + (p.stockMin||0) + '</td>' +
          '<td><strong>' + cant + '</strong></td>' +
          '<td>C$' + Number(p.precio||0).toFixed(2) + '</td>' +
          '<td><span class="badge ' + badgeCls + '">' + estadoLabel + '</span></td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
    }

    // Paginación
    html += buildPaginacionInv(pagina, totalPags, filtrados.length, filtro);

    document.getElementById('stockTable').innerHTML = html;
  }

  function buildPaginacionInv(pag, total, totalItems, filtro) {
    if (total <= 1) return '<div class="pag-info">' + totalItems + ' producto(s)</div>';
    var html = '<div class="paginacion">';
    html += '<span class="pag-info">' + totalItems + ' productos &nbsp;&bull;&nbsp; Página ' + pag + ' de ' + total + '</span>';
    html += '<div class="pag-btns">';
    html += '<button class="pag-btn" ' + (pag <= 1 ? 'disabled' : 'onclick="_irPagInv(1,\'' + filtro + '\')"') + '>«</button>';
    html += '<button class="pag-btn" ' + (pag <= 1 ? 'disabled' : 'onclick="_irPagInv(' + (pag-1) + ',\'' + filtro + '\')"') + '>‹</button>';
    // Rango de botones
    var inicio = Math.max(1, pag - 2), fin = Math.min(total, pag + 2);
    for (var i = inicio; i <= fin; i++) {
      html += '<button class="pag-btn' + (i === pag ? ' active' : '') + '" onclick="_irPagInv(' + i + ',\'' + filtro + '\')">' + i + '</button>';
    }
    html += '<button class="pag-btn" ' + (pag >= total ? 'disabled' : 'onclick="_irPagInv(' + (pag+1) + ',\'' + filtro + '\')"') + '>›</button>';
    html += '<button class="pag-btn" ' + (pag >= total ? 'disabled' : 'onclick="_irPagInv(' + total + ',\'' + filtro + '\')"') + '>»</button>';
    html += '</div></div>';
    return html;
  }

  function _irPagInv(pag, filtro) {
    if (_invDatos) _renderInventario(_invDatos, pag, filtro || _invFiltro || '');
    document.getElementById('stockTable').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Helper genérico de paginación (para alertas de dashboard)
  function buildPaginacion(pagActual, totalPags, fnNombre, datos, container) {
    if (totalPags <= 1) return '';
    window._pagDatos = window._pagDatos || {};
    window._pagDatos[fnNombre] = datos;
    var html = '<div class="paginacion"><div class="pag-btns">';
    html += '<button class="pag-btn" ' + (pagActual <= 1 ? 'disabled' : '') + ' onclick="' + fnNombre + '(window._pagDatos[\'' + fnNombre + '\'],document.getElementById(\'' + container.id + '\'),' + (pagActual-1) + ')">‹</button>';
    for (var i = 1; i <= totalPags; i++) {
      html += '<button class="pag-btn' + (i === pagActual ? ' active' : '') + '" onclick="' + fnNombre + '(window._pagDatos[\'' + fnNombre + '\'],document.getElementById(\'' + container.id + '\'),' + i + ')">' + i + '</button>';
    }
    html += '<button class="pag-btn" ' + (pagActual >= totalPags ? 'disabled' : '') + ' onclick="' + fnNombre + '(window._pagDatos[\'' + fnNombre + '\'],document.getElementById(\'' + container.id + '\'),' + (pagActual+1) + ')">›</button>';
    html += '</div></div>';
    return html;
  }

  function displayHistorialTable(movimientos, filtros) {
    const container = document.getElementById('historialTable');

    if (movimientos.length === 0) {
      container.innerHTML = '<div class="message warning"> No se encontraron movimientos con los filtros aplicados</div>';
      document.getElementById('resumenReporte').innerHTML = '';
      return;
    }

    const tipoStyles = {
      'INGRESO': ['text-success', 'Ingreso', '+'],
      'SALIDA': ['text-danger', 'Salida', '-'],
      'VENTA': ['text-info', 'Venta', 'v'],
      'AJUSTE_POSITIVO': ['text-success', 'Ajuste +', '+'],
      'AJUSTE_NEGATIVO': ['text-danger', 'Ajuste -', '-'],
      'AJUSTE': ['text-warning', 'Ajuste', '~']
    };

    // Generar resumen
    let resumenHTML = '<div class="message success">';
    resumenHTML += '<strong> Se encontraron ' + movimientos.length + ' movimiento(s)</strong><br>';

    if (filtros && Object.keys(filtros).some(k => filtros[k] && k !== 'fechaDesde' && k !== 'fechaHasta')) {
      resumenHTML += '<div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.1);">';
      resumenHTML += '<strong>Filtros aplicados:</strong><br>';
      if (filtros.tipo) resumenHTML += '" Tipo: ' + getTipoTextoFiltro(filtros.tipo) + '<br>';
      if (filtros.ubicacion) resumenHTML += '" Ubicacion: ' + filtros.ubicacion + '<br>';
      if (filtros.producto) resumenHTML += '" Producto: ' + filtros.producto + '<br>';
      if (filtros.vendedor) resumenHTML += ' Vendedor: ' + filtros.vendedor + '<br>';
      resumenHTML += '</div>';
    }
    resumenHTML += '</div>';
    document.getElementById('resumenReporte').innerHTML = resumenHTML;

    // Determinar si hay ventas para mostrar columnas adicionales
    const hayVentas = movimientos.some(m => m.tipo === 'VENTA' && m.vendedor);

    // Generar tabla
    let html = '<table><thead><tr>';
    html += '<th>Fecha</th>';
    html += '<th>Codigo</th>';
    html += '<th>Producto</th>';
    html += '<th>Tipo</th>';
    html += '<th>Cantidad</th>';
    html += '<th>Ubicacion</th>';

    if (hayVentas) {
      html += '<th>Vendedor</th>';
      html += '<th>Entregador</th>';
      html += '<th>Lugar Entrega</th>';
      html += '<th>Monto</th>';
    }

    html += '<th>Observaciones</th>';
    html += '</tr></thead><tbody>';

    movimientos.forEach(m => {
      const [cssClass, tipoTexto, icono] = tipoStyles[m.tipo] || ['text-info', m.tipo, '"'];
      html += `<tr>
      <td>${m.fecha}</td>
      <td><strong>${m.codigo}</strong></td>
      <td>${m.producto}</td>
      <td class="${cssClass}">${icono} ${tipoTexto}</td>
      <td><strong>${m.cantidad}</strong></td>
      <td>${m.ubicacion || '-'}</td>`;

      if (hayVentas) {
        html += `<td>${m.vendedor || '-'}</td>`;
        html += `<td>${m.entregador || '-'}</td>`;
        html += `<td>${m.lugarEntrega || '-'}</td>`;
        html += `<td>${m.montoTotal ? '<strong>$' + m.montoTotal.toFixed(2) + '</strong>' : '-'}</td>`;
      }

      html += `<td style="max-width: 200px; white-space: normal;">${m.observaciones}</td>
    </tr>`;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  // ---- Logica del carrito ----

  function agregarAlCarrito() {
    const productoInput = document.getElementById('carritoProductoInput');
    const codigo = productoInput.dataset.codigo || productoInput.value.trim().split(' - ')[0] || '';
    const nombre = productoInput.dataset.nombre || productoInput.value.trim().split(' - ').slice(1).join(' - ') || codigo;
    const almacen = document.getElementById('carritoAlmacenInput').value;
    const precioUnit = parseFloat(document.getElementById('carritoPrecioInput').value);
    const cantidad = parseFloat(document.getElementById('carritoCantidadInput').value);

    // Validaciones
    if (!codigo) {
      alert(' Selecciona un producto');
      productoInput.focus();
      return;
    }
    if (!almacen) {
      alert(' Selecciona un almacen de origen');
      document.getElementById('carritoAlmacenInput').focus();
      return;
    }
    if (isNaN(precioUnit) || precioUnit < 0) {
      alert(' Ingresa un precio unitario valido');
      document.getElementById('carritoPrecioInput').focus();
      return;
    }
    if (isNaN(cantidad) || cantidad <= 0) {
      alert(' Ingresa una cantidad valida (mayor a 0)');
      document.getElementById('carritoCantidadInput').focus();
      return;
    }

    const subtotal = precioUnit * cantidad;

    carritoVentas.push({
      codigo: codigo.toUpperCase(),
      nombre: nombre,
      almacen: almacen,
      precioUnit: precioUnit,
      cantidad: cantidad,
      subtotal: subtotal
    });

    renderizarCarrito();
    actualizarTotalVenta();

    // Limpiar inputs para el siguiente producto
    productoInput.value = '';
    productoInput.dataset.codigo = '';
    productoInput.dataset.nombre = '';
    document.getElementById('carritoPrecioInput').value = '';
    document.getElementById('carritoCantidadInput').value = '';
    productoInput.focus();
  }

  // ---- Registro de la venta ----

  function registrarVentaDetallada(event) {
    event.preventDefault();

    const form = event.target;
    const submitButton = form.querySelector('button[type="submit"]');

    if (!submitButton) {
      console.error('No se encontro el boton de submit');
      return;
    }

    const originalButtonText = submitButton.innerHTML;

    // Deshabilitar boton
    submitButton.disabled = true;
    submitButton.innerHTML = ' Procesando venta...';
    submitButton.style.opacity = '0.6';
    submitButton.style.cursor = 'not-allowed';

    // Timeout de seguridad
    const timeoutId = setTimeout(function () {
      restaurarBoton();
      alert(' La operacion esta tardando mucho. Verifica si se registro.');
    }, 15000);

    function restaurarBoton() {
      clearTimeout(timeoutId);
      submitButton.disabled = false;
      submitButton.innerHTML = originalButtonText;
      submitButton.style.opacity = '1';
      submitButton.style.cursor = 'pointer';
    }

    // ========================================
    // VALIDAR CARRITO
    // ========================================
    if (carritoVentas.length === 0) {
      alert(' Debes agregar al menos un producto al carrito');
      restaurarBoton();
      return;
    }

    // ========================================
    // RECOLECTAR DATOS DEL FORMULARIO
    // ========================================
    const vendedor = document.getElementById('ventaVendedor').value.trim();
    const entregador = document.getElementById('ventaEntregador').value.trim();
    const canalVenta = document.getElementById('ventaCanalVenta').value.trim();
    const envioCobrado = parseFloat(document.getElementById('ventaEnvioCobrado').value) || 0;
    const lugarEntrega = document.getElementById('ventaLugarEntrega').value.trim();
    const horaSalida = document.getElementById('ventaHoraSalida').value;
    const horaFinalizacion = document.getElementById('ventaHoraFinalizacion').value;
    const observaciones = document.getElementById('ventaObservaciones').value.trim();

    // ========================================
    // VALIDACIONES DE CAMPOS OBLIGATORIOS
    // ========================================
    if (!vendedor) {
      alert(' El vendedor es obligatorio');
      restaurarBoton();
      return;
    }

    if (!lugarEntrega) {
      alert(' El lugar de entrega es obligatorio');
      restaurarBoton();
      return;
    }

    if (!canalVenta) {
      alert(' El canal de venta es obligatorio');
      restaurarBoton();
      return;
    }

    // ========================================
    // CALCULAR TOTAL
    // ========================================
    const subtotalProductos = carritoVentas.reduce(function (sum, item) {
      return sum + item.subtotal;
    }, 0);
    const totalVenta = subtotalProductos + envioCobrado;

    // ========================================
    // CREAR OBJETO DE VENTA
    // ========================================
    const items = carritoVentas.map(function (item) {
      return {
        codigo: item.codigo,
        nombre: item.nombre,
        cantidad: item.cantidad,
        precioUnit: item.precioUnit,
        subtotal: item.subtotal,
        almacen: item.almacen
      };
    });

    const venta = {
      vendedor: vendedor,
      entregador: entregador,
      canalVenta: canalVenta,
      items: items,
      subtotalProductos: subtotalProductos,
      envioCobrado: envioCobrado,
      total: totalVenta,
      lugarEntrega: lugarEntrega,
      horaSalida: horaSalida,
      horaFinalizacion: horaFinalizacion,
      observaciones: observaciones,
      fecha: new Date().toISOString()
    };

    console.log('" Enviando venta al servidor:', venta);

    // ========================================
    // ENVIAR AL BACKEND
    // ========================================
    google.script.run
      .withSuccessHandler(function (resultado) {
        console.log('" Respuesta del servidor:', resultado);
        restaurarBoton();

        if (!resultado) {
          alert(' Error: No se recibio respuesta del servidor');
          return;
        }

        if (resultado.success === true) {
          const mensaje = resultado.message || ' Venta registrada correctamente';
          alert(mensaje);
          console.log(' Venta exitosa. ID:', resultado.idVenta);

          setTimeout(function () {
            cerrarModalVenta();
            if (typeof loadDashboard === 'function') {
              loadDashboard();
            }
            if (typeof mostrarStock === 'function') {
              mostrarStock();
            }
          }, 500);
        } else {
          const mensajeError = resultado.message || 'Error desconocido al procesar la venta';
          alert(' ' + mensajeError);
          console.error(' Error en venta:', mensajeError);
        }
      })
      .withFailureHandler(function (error) {
        console.error(' Error de comunicacion con el servidor:', error);
        restaurarBoton();
        const mensajeError = error.message || 'Error de comunicacion con el servidor';
        alert(' Error del sistema:\n\n' + mensajeError + '\n\nLa venta NO ha sido registrada.');
      })
      .registrarVentaDetallada(venta);
  }

  (function fitToContent() {
    function syncBodyHeight() {
      // Resetear minHeight primero para permitir que se encoja
      document.body.style.minHeight = '100vh';

      // Forzar reflow
      void document.body.offsetHeight;

      // Ahora medir el contenido actual (no el maximo historico)
      const main = document.querySelector('.main-content');
      const activeTab = document.querySelector('.tab-content.active');

      // Usar solo el contenido activo, no todo el scrollHeight
      const h = Math.max(
        window.innerHeight,
        activeTab ? activeTab.scrollHeight : 0,
        main ? main.scrollHeight : 0
      );

      document.body.style.minHeight = h + 'px';
    }
    // correr ahora y en cambios de tamano/orientacion/contenido
    const ro = new ResizeObserver(syncBodyHeight);
    ro.observe(document.documentElement);
    if (document.querySelector('.main-content')) ro.observe(document.querySelector('.main-content'));
    window.addEventListener('resize', syncBodyHeight);
    window.addEventListener('orientationchange', syncBodyHeight);
    document.addEventListener('DOMContentLoaded', syncBodyHeight);
    setTimeout(syncBodyHeight, 0);
  })();

    Chart.defaults.color = '#666680';
    Chart.defaults.borderColor = '#252530';
    Chart.defaults.font.family = "'DM Mono', monospace";
    Chart.defaults.font.size = 11;

    // Populate header
    var el;
    el = document.getElementById('ddTotalGen'); if (el) el.textContent = ddFmt(D.totalGeneral);
    el = document.getElementById('ddTotalTx'); if (el) el.textContent = D.totalTransacciones;
    el = document.getElementById('ddPeriodo'); if (el) el.textContent = D.periodoLabel;

    // Hide loading, show content
    var loadEl = document.getElementById('ddLoading');
    var contentEl = document.getElementById('ddContent');
    if (loadEl) loadEl.style.display = 'none';
    if (contentEl) contentEl.style.display = 'block';

    // Build all panels
    buildResumen();
    buildCanal();
    buildVendedores();
    buildProductos();
    buildPxV();
    buildTiempo();
    buildTopDias();
    buildFinanzas();
    buildInventarioReal();
  }

  function showDashPanel(id, btn) {
    document.querySelectorAll('.dd-panel').forEach(function (p) { p.classList.remove('active') });
    document.querySelectorAll('.dd-tab').forEach(function (t) { t.classList.remove('active') });
    var panel = document.getElementById('ddp-' + id);
    if (panel) panel.classList.add('active');
    if (btn) btn.classList.add('active');
  }

  // "" RESUMEN ""
  function buildResumen() {
    if (!D) return;

    var avgTx = D.totalTransacciones > 0 ? Math.round(D.totalGeneral / D.totalTransacciones) : 0;
    var bestDayLabel = D.mejorDia.fecha !== '-' ? ddFmtDate(D.mejorDia.fecha) : '-';

    var kpiHtml = '';
    kpiHtml += '<div class="dd-kpi"><div class="dd-kpi-label">Ingresos Totales</div><div class="dd-kpi-value kpi-c1">' + ddFmt(D.totalGeneral) + '</div><div class="dd-kpi-sub">' + D.meses.length + ' meses de operacion</div></div>';
    kpiHtml += '<div class="dd-kpi"><div class="dd-kpi-label">Transacciones</div><div class="dd-kpi-value kpi-c2">' + D.totalTransacciones + '</div><div class="dd-kpi-sub">Promedio ' + ddFmt(avgTx) + ' c/u</div></div>';
    kpiHtml += '<div class="dd-kpi"><div class="dd-kpi-label">Mejor Vendedor</div><div class="dd-kpi-value" style="font-size:18px">' + D.mejorVendedor + '</div><div class="dd-kpi-sub kpi-c1">' + ddFmt(D.mejorVendedorTotal) + ' en ventas</div></div>';
    kpiHtml += '<div class="dd-kpi"><div class="dd-kpi-label">Mejor Dia</div><div class="dd-kpi-value kpi-c3" style="font-size:18px">' + bestDayLabel + '</div><div class="dd-kpi-sub">' + ddFmt(D.mejorDia.total) + '  ' + D.mejorDia.ventas + ' ventas</div></div>';
    kpiHtml += '<div class="dd-kpi"><div class="dd-kpi-label">Inventario Actual</div><div class="dd-kpi-value kpi-c4">' + D.inventario.totalPiezas.toLocaleString() + '</div><div class="dd-kpi-sub">Valor: ' + ddFmt(D.inventario.valorTotal) + '</div></div>';
    kpiHtml += '<div class="dd-kpi"><div class="dd-kpi-label">Utilidad Neta (Mes)</div><div class="dd-kpi-value ' + (D.finanzas.utilidadNeta >= 0 ? 'kpi-c1' : 'kpi-c3') + '">' + ddFmt(D.finanzas.utilidadNeta) + '</div><div class="dd-kpi-sub">Ingresos - Gastos del mes</div></div>';
    kpiHtml += '<div class="dd-kpi"><div class="dd-kpi-label">Envios Cobrados</div><div class="dd-kpi-value kpi-c2">' + ddFmt(D.totalEnvios || 0) + '</div><div class="dd-kpi-sub">Mes actual: ' + ddFmt(D.totalEnviosMes || 0) + '</div></div>';
    kpiHtml += '<div class="dd-kpi"><div class="dd-kpi-label">Rotacion Inventario</div><div class="dd-kpi-value kpi-c4">' + (D.rotacionInventario || 0) + 'x</div><div class="dd-kpi-sub">' + (D.rotacionInventario > 6 ? 'Alta - Reabastecer' : D.rotacionInventario < 2 ? 'Baja - Revisar' : 'Optima') + '</div></div>';
    kpiHtml += '<div class="dd-kpi"><div class="dd-kpi-label">Margen de Ganancia</div><div class="dd-kpi-value ' + ((D.margenPromedio || 0) >= 25 ? 'kpi-c1' : 'kpi-c3') + '">' + (D.margenPromedio || 0) + '%</div><div class="dd-kpi-sub">' + ((D.margenPromedio || 0) >= 40 ? 'Saludable' : (D.margenPromedio || 0) >= 25 ? 'Aceptable' : 'Revisar precios') + '</div></div>';
    document.getElementById('ddKpiGrid').innerHTML = kpiHtml;

    // Chart: Ingresos por Mes
    ddMakeChart('chartMes', {
      type: 'bar', data: {
        labels: D.ventas_mes.map(function (m) { return MESES_ES_MAP[m.mes] || m.mes }),
        datasets: [{
          label: 'Ingresos', data: D.ventas_mes.map(function (m) { return m.total }),
          backgroundColor: ['#667eea99', '#43e97b99', '#f5576c99', '#a78bfa99'],
          borderColor: ['#667eea', '#43e97b', '#f5576c', '#a78bfa'], borderWidth: 2, borderRadius: 6
        }]
      },
      options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#252530' }, ticks: { callback: function (v) { return 'C$' + v.toLocaleString() } } } } }
    });

    // Chart: Vendedor totales
    var totales = {}; D.vendedores.forEach(function (v) { totales[v] = 0 });
    D.vendedores_mes.forEach(function (r) { totales[r.vendedor] = (totales[r.vendedor] || 0) + r.total });
    ddMakeChart('chartVendTot', {
      type: 'bar', data: {
        labels: D.vendedores,
        datasets: [{
          data: D.vendedores.map(function (v) { return totales[v] }),
          backgroundColor: D.vendedores.map(function (v) { return (DD_COLORS_MAP[v] || '#888') + 'aa' }),
          borderColor: D.vendedores.map(function (v) { return DD_COLORS_MAP[v] || '#888' }), borderWidth: 2, borderRadius: 8
        }]
      },
      options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#252530' }, ticks: { callback: function (v) { return 'C$' + v.toLocaleString() } } }, y: { grid: { display: false } } } }
    });

    // Chart: Top productos
    var top8 = D.top_productos.slice(0, 8);
    ddMakeChart('chartProdRes', {
      type: 'bar', data: {
        labels: top8.map(function (p) { return p.producto }),
        datasets: [{ data: top8.map(function (p) { return p.cantidad }), backgroundColor: '#a78bfa55', borderColor: '#a78bfa', borderWidth: 2, borderRadius: 5 }]
      },
      options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#252530' } } } }
    });

    // Chart: Dia semana radar
    if (D.ventas_dia_semana.length > 0) {
      var lbls = D.ventas_dia_semana.map(function (d) { return DIAS_ES[d.DiaSemana] || d.DiaSemana });
      ddMakeChart('chartDiaSem', {
        type: 'radar', data: {
          labels: lbls,
          datasets: [{ label: 'Ingresos', data: D.ventas_dia_semana.map(function (d) { return d.total }), borderColor: '#667eea', backgroundColor: '#667eea20', pointBackgroundColor: '#667eea', pointRadius: 4 },
          { label: 'Transacciones', data: D.ventas_dia_semana.map(function (d) { return d.ventas * 500 }), borderColor: '#43e97b', backgroundColor: '#43e97b15', pointBackgroundColor: '#43e97b', pointRadius: 3 }]
        },
        options: { plugins: { legend: { labels: { font: { size: 11 } } } }, scales: { r: { grid: { color: '#252530' }, angleLines: { color: '#252530' }, ticks: { display: false } } } }
      });
    }
  }

  // "" VENDEDORES POR MES ""

  // -- CANAL DE VENTA --
  function buildCanal() {
    if (!D || !D.ventasPorCanal || D.ventasPorCanal.length === 0) return;
    var canales = D.ventasPorCanal;
    var totalMonto = canales.reduce(function (s, c) { return s + c.monto }, 0);
    var colors = ['#667eea', '#43e97b', '#f5576c', '#a78bfa', '#ffd700', '#4facfe', '#f093fb', '#00f2fe'];
    ddMakeChart('chartCanal', {
      type: 'doughnut', data: {
        labels: canales.map(function (c) { return c.canal }),
        datasets: [{
          data: canales.map(function (c) { return c.monto }),
          backgroundColor: canales.map(function (_, i) { return colors[i % colors.length] + 'cc' }),
          borderColor: canales.map(function (_, i) { return colors[i % colors.length] }), borderWidth: 2
        }]
      },
      options: {
        cutout: '60%', plugins: {
          legend: { position: 'bottom', labels: { padding: 14, font: { size: 11 }, color: '#f0f0f5' } },
          tooltip: { callbacks: { label: function (ctx) { var pct = (ctx.parsed / totalMonto * 100).toFixed(1); return ctx.label + ': C$' + ctx.parsed.toLocaleString() + ' (' + pct + '%)' } } }
        }
      }
    });
    var statsHtml = '<div class="dd-card-title">Detalle por Canal</div>';
    canales.forEach(function (c, i) {
      var pct = totalMonto > 0 ? (c.monto / totalMonto * 100).toFixed(1) : '0.0';
      statsHtml += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--dborder)">' +
        '<div style="display:flex;align-items:center;gap:10px">' +
        '<div style="width:12px;height:12px;border-radius:50%;background:' + (colors[i % colors.length]) + '"></div>' +
        '<span style="font-family:Syne,sans-serif;font-weight:600">' + c.canal + '</span></div>' +
        '<div style="text-align:right">' +
        '<div style="font-family:Syne,sans-serif;font-weight:700;color:var(--daccent1)">C$' + Math.round(c.monto).toLocaleString() + '</div>' +
        '<div style="font-size:11px;color:var(--dmuted)">' + c.cantidad + ' ventas</div>' +
        '</div></div>';
    });
    var el = document.getElementById('ddCanalStats');
    if (el) el.innerHTML = statsHtml;
  }

  // -- VENDEDORES POR MES --
  function buildVendedores() {
    if (!D) return;
    renderVendMes();
    // Pie
    var totales = {}; D.vendedores.forEach(function (v) { totales[v] = 0 });
    D.vendedores_mes.forEach(function (r) { totales[r.vendedor] = (totales[r.vendedor] || 0) + r.total });
    ddMakeChart('chartPie', {
      type: 'doughnut', data: {
        labels: D.vendedores,
        datasets: [{
          data: D.vendedores.map(function (v) { return totales[v] }),
          backgroundColor: D.vendedores.map(function (v) { return (DD_COLORS_MAP[v] || '#888') + 'cc' }),
          borderColor: D.vendedores.map(function (v) { return DD_COLORS_MAP[v] || '#888' }), borderWidth: 2
        }]
      },
      options: { cutout: '65%', plugins: { legend: { position: 'bottom', labels: { padding: 16, font: { size: 11 }, color: '#f0f0f5' } } } }
    });
    // Tabla posiciones
    var html = D.meses.map(function (mes) {
      var mesData = D.vendedores_mes.filter(function (r) { return r.mes === mes }).sort(function (a, b) { return b.total - a.total });
      return '<div style="margin-bottom:16px"><div style="font-size:10px;letter-spacing:1.5px;color:var(--dmuted);text-transform:uppercase;margin-bottom:8px">' + (MESES_ES_MAP[mes] || mes) + '</div>' +
        mesData.map(function (r, i) {
          var cls = i === 0 ? 'gold' : i === 1 ? 'silver' : 'bronze'; var color = DD_COLORS_MAP[r.vendedor] || '#888';
          return '<div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid #25253080">' +
            '<span class="dd-rank ' + cls + '">#' + (i + 1) + '</span>' +
            '<span style="flex:1;font-size:13px">' + r.vendedor + '</span>' +
            '<span style="font-family:Syne,sans-serif;font-weight:700;color:' + color + '">' + ddFmt(r.total) + '</span>' +
            '<span style="font-size:11px;color:var(--dmuted)">' + r.ventas + ' ventas</span></div>';
        }).join('') + '</div>';
    }).join('');
    document.getElementById('tablaVendMes').innerHTML = html;
  }

  function renderVendMes() {
    if (!D) return;
    ddMakeChart('chartVendMes', {
      type: 'bar', data: {
        labels: D.meses.map(function (m) { return MESES_ES_MAP[m] || m }),
        datasets: D.vendedores.map(function (v) {
          return {
            label: v, data: D.meses.map(function (mes) {
              var r = D.vendedores_mes.find(function (x) { return x.mes === mes && x.vendedor === v });
              return r ? r[ddVendMode] : 0;
            }), backgroundColor: (DD_COLORS_MAP[v] || '#888') + '88', borderColor: DD_COLORS_MAP[v] || '#888', borderWidth: 2, borderRadius: 5
          };
        })
      },
      options: { plugins: { legend: { labels: { font: { size: 11 }, color: '#f0f0f5' } } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#252530' } } } }
    });
  }

  function setVendMode(mode, btn) {
    ddVendMode = mode;
    btn.parentNode.querySelectorAll('.dd-filter-btn').forEach(function (b) { b.classList.remove('active') });
    btn.classList.add('active');
    renderVendMes();
  }

  // "" TOP PRODUCTOS ""
  function buildProductos() {
    if (!D) return;
    var colors = D.top_productos.map(function (_, i) { return 'hsl(' + (80 + i * 18) + ', 90%, 60%)' });
    ddMakeChart('chartProdBar', {
      type: 'bar', data: {
        labels: D.top_productos.map(function (p) { return p.producto }),
        datasets: [{
          data: D.top_productos.map(function (p) { return p.cantidad }),
          backgroundColor: colors.map(function (c) { return c.replace(')', ', 0.6)').replace('hsl', 'hsla') }),
          borderColor: colors, borderWidth: 2, borderRadius: 6
        }]
      },
      options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#252530' } } } }
    });
    var maxQ = D.top_productos[0] ? D.top_productos[0].cantidad : 1;
    var html = '<table><thead><tr><th>Rank</th><th>Producto</th><th>Unidades</th><th style="width:200px">Proporcion</th></tr></thead><tbody>' +
      D.top_productos.map(function (p, i) {
        var pct = (p.cantidad / maxQ * 100).toFixed(0);
        var cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        return '<tr><td><span class="dd-rank ' + cls + '">#' + (i + 1) + '</span></td>' +
          '<td style="font-family:Syne,sans-serif;font-weight:600">' + p.producto + '</td>' +
          '<td style="color:var(--daccent1);font-family:Syne,sans-serif;font-weight:700">' + p.cantidad + '</td>' +
          '<td><div class="dd-bar-inline"><div class="dd-bar-track"><div class="dd-bar-fill" style="width:' + pct + '%;background:hsl(' + (80 + i * 18) + ',90%,60%)"></div></div><span style="font-size:11px;color:var(--dmuted)">' + p.cantidad + '</span></div></td></tr>';
      }).join('') + '</tbody></table>';
    document.getElementById('tablaProductos').innerHTML = html;
  }

  // "" PRODUCTOS POR VENDEDOR ""
  function buildPxV() {
    if (!D || D.vendedores.length === 0) return;
    var sel = document.getElementById('vendSelector');
    sel.innerHTML = D.vendedores.map(function (v) {
      return '<button class="dd-vend-btn ' + (v === ddActiveVend ? DD_VCLS[v] : '') + '" onclick="selectVend(\'' + v.replace(/'/g, "\\'") + '\',this)">' + v + '</button>';
    }).join('');
    renderPxV();
  }
  function selectVend(v, btn) {
    ddActiveVend = v;
    document.querySelectorAll('.dd-vend-btn').forEach(function (b) { b.className = 'dd-vend-btn' });
    btn.classList.add(DD_VCLS[v] || 'av1');
    renderPxV();
  }
  function renderPxV() {
    if (!D) return;
    var prods = D.productos_vendedor.filter(function (r) { return r.vendedor === ddActiveVend }).sort(function (a, b) { return b.cantidad - a.cantidad });
    var top = prods.slice(0, 10);
    var color = DD_COLORS_MAP[ddActiveVend] || '#667eea';
    ddMakeChart('chartPxVPie', {
      type: 'doughnut', data: {
        labels: top.map(function (p) { return p.producto }),
        datasets: [{
          data: top.map(function (p) { return p.cantidad }),
          backgroundColor: top.map(function (_, i) { return 'hsla(' + (i * 36) + ',80%,60%,0.7)' }),
          borderColor: top.map(function (_, i) { return 'hsl(' + (i * 36) + ',80%,60%)' }), borderWidth: 1
        }]
      },
      options: { cutout: '50%', plugins: { legend: { position: 'right', labels: { font: { size: 10 }, padding: 8, color: '#f0f0f5' } } } }
    });
    var maxQ = top[0] ? top[0].cantidad : 1;
    var totalQ = prods.reduce(function (s, x) { return s + x.cantidad }, 0);
    document.getElementById('tablaPxV').innerHTML = '<table><thead><tr><th>Producto</th><th>Unidades</th><th>%</th></tr></thead><tbody>' +
      top.map(function (p) {
        var pct = (p.cantidad / totalQ * 100).toFixed(1);
        return '<tr><td style="font-family:Syne,sans-serif;font-weight:600">' + p.producto + '</td>' +
          '<td><div class="dd-bar-inline"><div class="dd-bar-track"><div class="dd-bar-fill" style="width:' + (p.cantidad / maxQ * 100).toFixed(0) + '%;background:' + color + '"></div></div>' + p.cantidad + '</div></td>' +
          '<td style="color:var(--dmuted);font-size:11px">' + pct + '%</td></tr>';
      }).join('') + '</tbody></table>';
  }

  // "" TIEMPO ""
  function buildTiempo() {
    if (!D) return;
    renderTiempo();
    if (D.ventas_dia_semana.length > 0) {
      ddMakeChart('chartDiaSem2', {
        type: 'bar', data: {
          labels: D.ventas_dia_semana.map(function (d) { return DIAS_ES[d.DiaSemana] || d.DiaSemana }),
          datasets: [{ data: D.ventas_dia_semana.map(function (d) { return d.ventas }), backgroundColor: '#43e97b55', borderColor: '#43e97b', borderWidth: 2, borderRadius: 5 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#252530' } } } }
      });
      ddMakeChart('chartDiaSemMonto', {
        type: 'bar', data: {
          labels: D.ventas_dia_semana.map(function (d) { return DIAS_ES[d.DiaSemana] || d.DiaSemana }),
          datasets: [{ data: D.ventas_dia_semana.map(function (d) { return d.total }), backgroundColor: '#667eea55', borderColor: '#667eea', borderWidth: 2, borderRadius: 5 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#252530' }, ticks: { callback: function (v) { return 'C$' + v.toLocaleString() } } } } }
      });
    }
  }
  function renderTiempo() {
    if (!D) return;
    var labels, data, label;
    if (ddTiempoMode === 'dia') {
      labels = D.ventas_dia.map(function (d) { return ddFmtDate(d.fecha) });
      data = D.ventas_dia.map(function (d) { return d.total });
      label = 'Ingresos por Dia'; document.getElementById('tiempoTitle').textContent = 'Ventas por Dia';
    } else if (ddTiempoMode === 'semana') {
      labels = D.ventas_dia_semana.map(function (d) { return DIAS_ES[d.DiaSemana] || d.DiaSemana });
      data = D.ventas_dia_semana.map(function (d) { return d.total });
      label = 'Ingresos por Dia de Semana'; document.getElementById('tiempoTitle').textContent = 'Ingresos por Dia de la Semana';
    } else {
      labels = D.ventas_mes.map(function (m) { return MESES_ES_MAP[m.mes] || m.mes });
      data = D.ventas_mes.map(function (m) { return m.total });
      label = 'Ingresos por Mes'; document.getElementById('tiempoTitle').textContent = 'Ventas por Mes';
    }
    ddMakeChart('chartTiempo', {
      type: ddTiempoMode === 'dia' ? 'line' : 'bar',
      data: {
        labels: labels, datasets: [{
          label: label, data: data,
          backgroundColor: ddTiempoMode === 'dia' ? '#667eea20' : '#667eea55',
          borderColor: '#667eea', borderWidth: 2, borderRadius: ddTiempoMode !== 'dia' ? 6 : 0,
          fill: ddTiempoMode === 'dia', tension: 0.4, pointBackgroundColor: '#667eea',
          pointRadius: ddTiempoMode === 'dia' ? 3 : 0
        }]
      },
      options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { maxRotation: 45 } }, y: { grid: { color: '#252530' }, ticks: { callback: function (v) { return 'C$' + v.toLocaleString() } } } } }
    });
  }
  function setTiempoMode(mode, btn) {
    ddTiempoMode = mode;
    btn.parentNode.querySelectorAll('.dd-filter-btn').forEach(function (b) { b.classList.remove('active') });
    btn.classList.add('active');
    renderTiempo();
  }

  // "" TOP DIAS ""
  function buildTopDias() {
    if (!D) return;

      type: 'bar', data: {
        labels: D.top_dias.map(function (d) { return ddFmtDate(d.fecha) }),
        datasets: [{
          data: D.top_dias.map(function (d) { return d.total }),

          borderColor: D.top_dias.map(function (_, i) { return 'hsl(' + (60 - i * 4) + ',' + (90 - i * 3) + '%,' + (70 - i * 3) + '%)' }),
          borderWidth: 2, borderRadius: 6
        }]
      },
      options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#252530' }, ticks: { callback: function (v) { return 'C$' + v.toLocaleString() } } }, y: { grid: { display: false } } } }
    });
  }

  // "" FINANZAS ""
  function buildFinanzas() {
    if (!D) return;

  function renderizarGraficoCanales(datosCanales) {
    const canvas = document.getElementById('chartCanalesVenta');
    if (!canvas) return;

    const ctx = canvas.getContext('2d');

    // Colores distintivos por canal
    const coloresPorCanal = {
      'Facebook Marketplace': '#4267B2',
      'WhatsApp': '#25D366',
      'Instagram': '#E4405F',
      'TikTok': '#000000',
      'Presencial/Local': '#6C757D',
      'No especificado': '#CCCCCC'
    };

    const labels = datosCanales.map(d => d.canal);
    const montos = datosCanales.map(d => d.monto);
    const cantidades = datosCanales.map(d => d.cantidad);
    const colores = datosCanales.map(d => coloresPorCanal[d.canal] || '#999999');

    // Calcular total para porcentajes
    const totalMonto = montos.reduce((a, b) => a + b, 0);

    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          label: 'Ventas por Canal',
          data: montos,
          backgroundColor: colores,
          borderColor: '#ffffff',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: {
            position: 'right',
            labels: {
              font: {
                size: 12
              },
              generateLabels: function (chart) {
                const data = chart.data;
                if (data.labels.length && data.datasets.length) {
                  return data.labels.map((label, i) => {
                    const value = data.datasets[0].data[i];
                    const cantidad = cantidades[i];
                    const porcentaje = ((value / totalMonto) * 100).toFixed(1);
                    return {
                      text: `${label}: $${value.toFixed(2)} (${porcentaje}%) - ${cantidad} ventas`,
                      fillStyle: data.datasets[0].backgroundColor[i],
                      hidden: false,
                      index: i
                    };
                  });
                }
                return [];
              }
            }
          },
          tooltip: {
            callbacks: {
              label: function (context) {
                const label = context.label || '';
                const value = context.parsed || 0;
                const cantidad = cantidades[context.dataIndex];
                const porcentaje = ((value / totalMonto) * 100).toFixed(1);
                return `${label}: $${value.toFixed(2)} (${porcentaje}%) - ${cantidad} ventas`;
              }
            }
          }
        }
      }
    });
  }

  /**
   * Procesa el archivo CSV seleccionado y lo envia al backend
   */
  function procesarImportacionCSV() {
    const fileInput = document.getElementById('archivoCSV');
    const msgContainer = document.getElementById('msgImportacion');
    const resultadoContainer = document.getElementById('resultadoImportacion');

    // Limpiar mensajes previos
    msgContainer.innerHTML = '';
    resultadoContainer.innerHTML = '';

    // Validar que se haya seleccionado un archivo
    if (!fileInput.files || fileInput.files.length === 0) {
      showMessage('msgImportacion', ' Por favor selecciona un archivo CSV', 'warning');
      return;
    }

    const file = fileInput.files[0];

    // Validar que sea un archivo CSV
    if (!file.name.toLowerCase().endsWith('.csv')) {
      showMessage('msgImportacion', ' El archivo debe ser formato CSV (.csv)', 'error');
      return;
    }

    // Mostrar indicador de carga
    msgContainer.innerHTML = '<div class="message info"> Leyendo archivo CSV...</div>';

    // Leer el archivo
    const reader = new FileReader();

    reader.onload = function (e) {
      try {
        const contenido = e.target.result;

        // Parsear CSV
        msgContainer.innerHTML = '<div class="message info">" Procesando datos...</div>';
        const csvData = parsearCSV(contenido);

        if (!csvData || csvData.length === 0) {
          showMessage('msgImportacion', ' El archivo CSV esta vacio o no se pudo leer', 'error');
          return;
        }

        // Mostrar progreso
        msgContainer.innerHTML = '<div class="message info"> Enviando datos al servidor... Esto puede tomar unos momentos.</div>';

        // Enviar al backend
        google.script.run
          .withSuccessHandler(mostrarResultadoImportacion)
          .withFailureHandler(function (error) {
            showMessage('msgImportacion', ' Error al procesar importacion: ' + error.message, 'error');
            resultadoContainer.innerHTML = '';
          })
          .importarInventarioMasivo(csvData);

      } catch (error) {
        showMessage('msgImportacion', ' Error al leer el archivo: ' + error.message, 'error');
      }
    };

    reader.onerror = function () {
      showMessage('msgImportacion', ' Error al leer el archivo', 'error');
    };

    reader.readAsText(file);
  }

  /**
   * Parsea el contenido CSV en un array bidimensional
   * @param {string} texto - Contenido del archivo CSV
   * @returns {Array<Array<string>>} Array bidimensional con los datos
   */
  function parsearCSV(texto) {
    const lineas = texto.split(/\r?\n/);
    const resultado = [];

    for (let i = 0; i < lineas.length; i++) {
      const linea = lineas[i].trim();
      if (linea.length === 0) continue;

      // Parseo de CSV con coma (,) como delimitador
      const campos = [];
      let campoActual = '';
      let dentroComillas = false;

      for (let j = 0; j < linea.length; j++) {
        const char = linea[j];

        if (char === '"') {
          dentroComillas = !dentroComillas;
        } else if (char === ',' && !dentroComillas) {  // CAMBIO: coma en lugar de punto y coma
          campos.push(campoActual.trim());
          campoActual = '';
        } else {
          campoActual += char;
        }
      }

      // Agregar el ultimo campo
      campos.push(campoActual.trim());
      resultado.push(campos);
    }

    return resultado;
  }

    html += `<p style="margin: 5px 0;">" <strong>Filas procesadas:</strong> ${stats.filasProcesadas}</p>`;

    if (stats.errores && stats.errores.length > 0) {

      html += '<h4 style="margin-bottom: 10px; color: #856404;"> Advertencias</h4>';

      });
      html += '</ul>';

    }

    html += '</div></div>';

    resultadoContainer.innerHTML = html;

    // Recargar vistas
    setTimeout(() => {
      if (typeof mostrarStock === 'function') mostrarStock();
      if (typeof loadDashboard === 'function') loadDashboard();

    };

    const frag = document.createDocumentFragment();
    const wrapper = document.createElement('div');
    wrapper.className = 'mov-feed';

    movimientos.forEach(function(m) {
      const info = iconMap[m.tipo] || { icon: '📋', cls: 'default', cantCls: 'info', signo: '' };
      const item = document.createElement('div');
      item.className = 'mov-item';
      item.innerHTML =
        '<div class="mov-icon ' + info.cls + '">' + info.icon + '</div>' +
        '<div class="mov-body">' +
          '<div class="mov-title">' + (m.codigo || '—') + ' · ' + (m.nombre || '') + '</div>' +
          '<div class="mov-sub">' + (m.tipo || '') + (m.ubicacion ? ' · ' + m.ubicacion : '') + (m.vendedor ? ' · ' + m.vendedor : '') + '</div>' +
        '</div>' +
        '<div class="mov-meta">' +
          '<div class="mov-fecha">' + (m.fecha || '') + '</div>' +
          '<div class="mov-cant ' + info.cantCls + '">' + info.signo + ' ' + (m.cantidad || 0) + '</div>' +
        '</div>';
      wrapper.appendChild(item);
    });

    frag.appendChild(wrapper);
    feed.innerHTML = '';
    feed.appendChild(frag);
  }

  // ---- FINANZAS RESUMEN ----
  function loadFinanzasResumen() {
    const hist = document.getElementById('historialFinanzas');
    if (!hist) return;
    hist.innerHTML = '<div class="loading">Cargando historial...</div>';

    // Resetear KPIs
    ['finKpiIngresos','finKpiGastos','finKpiUtilidad'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.textContent = '...';
    });

    google.script.run
      .withSuccessHandler(function(data) {
        renderFinanzasHistorial(data);
      })
      .withFailureHandler(function(err) {
        hist.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Error al cargar</div><div class="empty-state-sub">' + (err.message || err) + '</div></div>';
      })
      .obtenerHistorialFinanzas();
  }

  function renderFinanzasHistorial(data) {
    const hist = document.getElementById('historialFinanzas');
    if (!hist) return;

    // Calcular KPIs del mes actual
    const ahora = new Date();
    const mesActual = ahora.getMonth();
    const anioActual = ahora.getFullYear();
    let ingresos = 0, gastos = 0;

    if (data && data.movimientos && data.movimientos.length > 0) {
      data.movimientos.forEach(function(m) {
        if (!m.fecha) return;
        const fecha = new Date(m.fecha);
        if (fecha.getMonth() === mesActual && fecha.getFullYear() === anioActual) {
          const monto = parseFloat(m.monto) || 0;
          if ((m.tipo || '').toUpperCase().includes('GASTO') || (m.categoria || '').toUpperCase().includes('GASTO')) {
            gastos += monto;
          } else {
            ingresos += monto;
          }
        }
      });
    }

    const fmt = function(n) { return 'C$ ' + n.toLocaleString('es-NI', {minimumFractionDigits:2, maximumFractionDigits:2}); };
    const utilidad = ingresos - gastos;

    const elIng = document.getElementById('finKpiIngresos');
    const elGas = document.getElementById('finKpiGastos');
    const elUti = document.getElementById('finKpiUtilidad');
    if (elIng) elIng.textContent = fmt(ingresos);
    if (elGas) elGas.textContent = fmt(gastos);
    if (elUti) {
      elUti.textContent = fmt(utilidad);
      elUti.className = 'kpi-value ' + (utilidad >= 0 ? 'green' : 'red');
    }

    if (!data || !data.movimientos || data.movimientos.length === 0) {
      hist.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💰</div><div class="empty-state-title">Sin movimientos financieros</div><div class="empty-state-sub">Registra el primer movimiento con el botón de arriba</div></div>';
      return;
    }

    // Tabla con DocumentFragment para mayor velocidad
    const frag = document.createDocumentFragment();
    const table = document.createElement('table');
    const thead = document.createElement('thead');
    thead.innerHTML = '<tr><th>Fecha</th><th>Tipo</th><th>Categoría</th><th>Descripción</th><th>Monto</th></tr>';
    table.appendChild(thead);
    const tbody = document.createElement('tbody');

    data.movimientos.slice(0, 50).forEach(function(m) {
      const tr = document.createElement('tr');
      const monto = parseFloat(m.monto) || 0;
      const esGasto = (m.tipo||'').toUpperCase().includes('GASTO') || (m.categoria||'').toUpperCase().includes('GASTO');
      tr.innerHTML =
        '<td>' + (m.fecha || '—') + '</td>' +
        '<td><span class="badge ' + (esGasto ? 'badge-red' : 'badge-green') + '">' + (m.tipo || '—') + '</span></td>' +
        '<td>' + (m.categoria || '—') + '</td>' +
        '<td>' + (m.descripcion || '—') + '</td>' +
        '<td style="font-weight:700;color:' + (esGasto ? 'var(--danger)' : 'var(--success)') + ';">' + fmt(monto) + '</td>';
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    frag.appendChild(table);
    const wrapper = document.createElement('div');
    wrapper.className = 'table-container';
    wrapper.appendChild(frag);
    hist.innerHTML = '';
    hist.appendChild(wrapper);
  }



  // ---- MEJORA DE TABLA: usar DocumentFragment en renderizado de stock ----
  // La función mostrarStock del código original genera innerHTML string,
  // lo cual ya es razonablemente rápido. El filtro rápido de arriba
  // evita refetch del server en búsquedas locales.

</script>
